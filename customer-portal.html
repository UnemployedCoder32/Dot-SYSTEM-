<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Service Vault | DOT Systems</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="app-icon.png">
    <style>
        /* Modern Minimalist Aesthetic - Customer Facing */
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main);
            line-height: 1.5; -webkit-tap-highlight-color: transparent;
        }
        
        .header {
            background: var(--bg-card); padding: 1.5rem 1rem; text-align: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .header h1 { font-size: 1.25rem; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
        .header p { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem; }

        .container { max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem; }

        .info-card {
            background: var(--bg-card); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); border: 1px solid var(--border);
        }
        
        .machine-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: space-between; }
        .diamond-badge { color: #3b82f6; font-size: 1rem; background: #eff6ff; padding: 0.25rem 0.5rem; border-radius: 9999px; }
        .customer-meta { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.25rem; }

        .status-pill {
            display: inline-block; padding: 0.35rem 0.75rem; border-radius: 9999px;
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .status-active { background: #dcfce7; color: #166534; }
        .status-expired { background: #fee2e2; color: #991b1b; }

        h3.section-title { font-size: 1.1rem; font-weight: 600; margin: 2rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }

        .timeline { margin-left: 1rem; border-left: 2px solid var(--border); padding-left: 1.5rem; position: relative; }
        .timeline-item { margin-bottom: 1.5rem; position: relative; }
        .timeline-item::before {
            content: ''; position: absolute; left: -1.95rem; top: 0.25rem;
            width: 12px; height: 12px; border-radius: 50%; background: var(--primary);
            border: 3px solid var(--bg-card);
        }
        .timeline-date { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; margin-bottom: 0.25rem; }
        .timeline-title { font-weight: 600; margin-bottom: 0.25rem; }
        .timeline-desc { font-size: 0.9rem; color: var(--text-muted); }

        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; color: #cbd5e1; margin-bottom: 1rem; display: block; }

        /* Loader */
        #loader { text-align: center; padding: 4rem; display: flex; flex-direction: column; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #mainContent { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-shield-halved"></i> Service Vault</h1>
        <p>Customer Service & AMC History</p>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; color: var(--text-muted); font-weight: 500;">Securing Connection...</p>
    </div>

    <div class="container" id="mainContent">
        <div class="info-card">
            <h2 class="machine-title" id="custName">Customer Name <span id="diamondBadge" style="display:none;" class="diamond-badge"><i class="fa-solid fa-gem"></i> VIP</span></h2>
            <div class="customer-meta">
                <span id="custContact"><i class="fa-solid fa-phone"></i> Loading...</span>
                <span id="custAddress"><i class="fa-solid fa-location-dot"></i> Loading...</span>
            </div>
            
            <div style="margin-top: 1.5rem; padding: 1rem; background: var(--bg-main); border-radius: 8px; border: 1px solid var(--border);">
                <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; font-weight: 600;">Current AMC Status</div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="status-pill" id="amcStatus">Checking...</div>
                    <div style="font-size: 0.85rem; font-weight: 500;" id="amcValidUntil"></div>
                </div>
            </div>
        </div>

        <h3 class="section-title"><i class="fa-solid fa-clock-rotate-left"></i> Service History</h3>
        <div class="timeline" id="historyTimeline">
            <!-- Timeline details injected here -->
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="data-controller.js"></script>
    <script src="customer-portal.js"></script>
</body>
</html>
